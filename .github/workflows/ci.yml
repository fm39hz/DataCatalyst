name: CI

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet build -c Release

      - run: dotnet test -c Release --no-build

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet build -c Release

      - name: Set package version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Pack
        run: dotnet pack DataCatalyst.SourceGen/DataCatalyst.SourceGen.csproj -c Release -o ./artifacts -p:Version=$PACKAGE_VERSION --no-build

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to nuget.org
        run: dotnet nuget push ./artifacts/DataCatalyst.$PACKAGE_VERSION.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
