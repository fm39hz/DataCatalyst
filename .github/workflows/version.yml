name: Sync Version

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Update csproj Version
        run: |
          sed -i 's|<Version>.*</Version>|<Version>${{ env.VERSION }}</Version>|' \
            FM39hz.DataCatalyst.SourceGen/FM39hz.DataCatalyst.SourceGen.csproj

      - name: Update README install command
        run: |
          sed -i 's|dotnet add package FM39hz.DataCatalyst --version .*|dotnet add package FM39hz.DataCatalyst --version ${{ env.VERSION }}|' \
            README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync version to $VERSION [skip ci]"
          git push
